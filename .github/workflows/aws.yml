name: Fullstack CI/CD

on:
  push:
    branches:
      - main
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set Env
      id: env
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/production" ]]; then
          echo "TAG=prod" >> $GITHUB_OUTPUT
        else
          echo "TAG=staging" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Build Backend
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/coc-member-backend:${{ steps.env.outputs.TAG }} -f docker/Dockerfile.backend ./backend

    - name: Push Backend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/coc-member-backend:${{ steps.env.outputs.TAG }}

    # 🔹 Build Frontend
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/coc-member-frontend:${{ steps.env.outputs.TAG }} -f docker/Dockerfile.frontend ./frontend

    - name: Push Frontend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/coc-member-frontend:${{ steps.env.outputs.TAG }}

    # 🔹 Deploy
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ steps.env.outputs.TAG == 'prod' && secrets.EC2_HOST_PROD || secrets.EC2_HOST_STAGING }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/coc-member-backend:${{ steps.env.outputs.TAG }}
          docker pull ${{ secrets.DOCKER_USERNAME }}/coc-member-frontend:${{ steps.env.outputs.TAG }}

          cd app
          docker-compose down
          docker-compose up -d
