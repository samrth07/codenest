services:
    server:
        image: samlad07/coc-member-backend:latest
        build:
            context: ./backend
            dockerfile: ../docker/Dockerfile.backend
            target: production
        ports:
            - "127.0.0.1:3001:3000"
        env_file:
            - backend/.env
        environment:
            - PORT=3000
        healthcheck:
            test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
            interval: 30s
            timeout: 3s
            retries: 3

    web:
        image: samlad07/coc-member-frontend:latest
        build:
            context: ./frontend
            dockerfile: ../docker/Dockerfile.frontend
            target: production
            args:
                - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
        depends_on:
            - server
        env_file:
            - frontend/.env
        ports:
            - "127.0.0.1:5174:5173"
